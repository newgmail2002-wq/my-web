name: Deploy to GitHub Pages

# Rebuilds and publishes the site on every push to main.
# `enablement: true` below switches Pages on the first time this runs,
# so there is no button to click in Settings.

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you re-run it by hand from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Never let two deploys race each other
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (and enable it if it's off)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # It's a static site — nothing to build, just upload it as-is.
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
